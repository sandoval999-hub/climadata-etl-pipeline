# ── API Configuration ────────────────────────────────────────────────────────
api:
  forecast_url: "https://api.open-meteo.com/v1/forecast"
  historical_url: "https://archive-api.open-meteo.com/v1/archive"
  hourly_variables: "temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code"
  daily_variables: "temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,sunrise,sunset"
  timezone: "auto"
  rate_limit_pause_seconds: 0.15
  max_retries: 3
  backoff_base_seconds: 1

# ── Pipeline Parameters ─────────────────────────────────────────────────────
pipeline:
  historical_days: 90
  batch_size: 100

# ── Alert Thresholds ────────────────────────────────────────────────────────
thresholds:
  heat_index_temp_min: 27.0
  heat_index_humidity_min: 40.0
  heavy_rain_mm: 50.0
  high_wind_kmh: 60.0

# ── Validation Ranges ───────────────────────────────────────────────────────
validation:
  temperature_min: -10.0
  temperature_max: 55.0
  humidity_min: 0.0
  humidity_max: 100.0
  precipitation_min: 0.0
