version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: climadata-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-climadata2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-climadata}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: climadata-etl
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-climadata2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-climadata}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["--mode", "all"]

  airflow:
    image: apache/airflow:2.9.1
    container_name: climadata-airflow
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/app
    ports:
      - "8080:8080"
    command: standalone

volumes:
  mysql_data:
