name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 src/ tests/ main.py scheduler.py --max-line-length=120 --statistics

      - name: Check formatting with black
        run: black --check --line-length=120 src/ tests/ main.py scheduler.py

      - name: Check import ordering
        run: isort --check-only --profile black src/ tests/ main.py scheduler.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded credentials..."
          ! grep -rn "password\s*=" src/ main.py --include="*.py" | grep -v "env_vars\|config\|%s\|self._config\|parser\|#" || true
          echo "No hardcoded credentials found."

      - name: Verify .env is not tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked in git!"
            exit 1
          else
            echo ".env is properly excluded from git."
          fi
